<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mentor-connect</title>
    <script>
      window.addEventListener('error', function(e) {
        if(document.body) {
          const div = document.createElement('div');
          div.style.cssText = 'color:red; background:white; z-index:999999; position:fixed; top:0; left:0; width:100%; height:100%; padding:20px; font-size:16px; overflow:auto;';
          div.innerHTML = '<h1>Frontend Crash</h1><h2>' + e.message + '</h2><pre>' + (e.error ? e.error.stack : '') + '</pre>';
          document.body.appendChild(div);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
